<!DOCTYPE html>
<html lang="es">
<head>

<title>La Pirámide</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#09090F}
body{font-family:Georgia,'Times New Roman',serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{border-radius:2px;background:#3A3A5A}
input,select,textarea{outline:none;font-family:inherit}
input[type=range]{cursor:pointer;width:100%}
textarea{resize:none;line-height:1.6}
button{cursor:pointer;font-family:inherit}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes toast{0%{opacity:0;transform:translateX(-50%) translateY(-10px)}15%,80%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-8px)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
#app{max-width:430px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;background:#09090F;color:#C8C0A8;position:relative}
#main{flex:1;min-height:0;padding:18px 14px 88px;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;background:rgba(9,9,15,.96);border-top:1px solid #1E1E30;backdrop-filter:blur(12px);padding:6px 0 10px;z-index:50}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;background:none;border:none;color:inherit}
.ni{font-size:22px;transition:filter .2s}
.ni.dim{filter:grayscale(1) opacity(.3)}
.nl{font-size:9px;text-transform:uppercase;letter-spacing:.8px;font-family:'Georgia',serif;transition:color .2s}
.nd{width:18px;height:2px;border-radius:1px;margin-top:1px}
#toast-el{position:fixed;top:14px;left:50%;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:700;font-family:'Georgia',serif;letter-spacing:.8px;z-index:9999;white-space:nowrap;animation:toast 3.5s ease forwards;pointer-events:none;display:none}
.btn-p{width:100%;padding:14px;border-radius:12px;border:none;font-size:14px;font-weight:900;font-family:'Georgia',serif;letter-spacing:2px}
.sbox{border-radius:8px;padding:8px 4px;text-align:center}
.sval{font-size:20px;font-weight:900;font-family:'Georgia',serif}
.slbl{font-size:8px;text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.pbar{height:6px;border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width 1s ease}
.mpill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
.mbw{height:5px;border-radius:3px;overflow:hidden;margin-top:4px}
.mbf{height:100%;border-radius:3px;transition:width .6s}
.rpill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700}
.ahdr{width:100%;display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:10px;font-size:13px;font-weight:700;font-family:'Georgia',serif;border:none;transition:all .2s;text-align:left}
.abody{padding:14px;border-top:none;border-radius:0 0 10px 10px;animation:slideDown .2s ease}
.hrow{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:10px 12px;border-radius:8px}
.igrid{display:flex;flex-wrap:wrap;gap:3px;max-height:220px;overflow-y:auto}
.ibtn{width:36px;height:36px;border-radius:6px;font-size:20px;flex-shrink:0;transition:all .1s;display:flex;align-items:center;justify-content:center}
.csw{width:34px;height:34px;border-radius:8px;flex-shrink:0;transition:all .15s}
.tbtn{flex:1;padding:8px;border-radius:7px;font-size:13px;font-weight:700;transition:all .2s}
.sbtn{flex:1;padding:8px;border-radius:7px;font-size:15px;transition:all .2s}
.bbtn{width:100%;padding:13px;border-radius:10px;font-size:13px;font-weight:900;font-family:'Georgia',serif;letter-spacing:1px;border:none;transition:all .3s}
.stitle{font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.flbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.fi{width:100%;padding:9px 12px;border-radius:8px;font-size:13px}
.ni2{width:100%;padding:8px;border-radius:7px;text-align:center;font-size:14px;font-weight:700}
.bnum{width:100%;padding:8px;border-radius:7px;text-align:center;font-size:18px;font-weight:900;font-family:'Georgia',serif}
.tcard{padding:14px 8px;border-radius:10px;cursor:pointer;transition:all .2s;border:2px solid transparent}
.tdot{width:14px;height:14px;border-radius:3px;display:inline-block}
.back{background:none;border:none;font-size:22px;line-height:1;padding:0}
.dbtn{padding:5px 8px;border-radius:6px;background:none;font-size:13px}
.ebtn{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700}
.abtn{width:100%;padding:10px;border-radius:8px;background:none;font-size:13px;font-weight:700}
.gsts{padding:10px 14px;border-radius:8px;font-size:12px;font-family:Georgia,serif;line-height:1.5}
.pw{position:relative;display:inline-block}
.pdrop{position:absolute;top:110%;left:0;z-index:500;border-radius:12px;padding:12px;width:290px;box-shadow:0 8px 40px #00000099;animation:slideDown .2s ease}
.psrch{width:100%;padding:7px 10px;border-radius:7px;margin-bottom:8px;font-size:12px}
</style>

<script>
const THEMES={
  stone:{name:"Piedra Oscura",mode:"dark",bg:"#09090F",surface:"#0E0E1A",card:"#13131F",border:"#1E1E30",border2:"#2A2A40",text:"#C8C0A8",muted:"#6A6A8A",faint:"#3A3A5A",accent:"#D4A843",accentDark:"#7A5010",accentGlow:"#D4A84344",danger:"#EF5350",warn:"#FFB300",success:"#66BB6A",blockFill:"linear-gradient(145deg,#B87830,#5A3808)",blockEdge:"linear-gradient(145deg,#D4A843,#7A5010)",blockTop:"linear-gradient(145deg,#FFD54F,#FF8F00)",blockEmpty:"transparent",blockBorder:"#2A2A1A",navBg:"rgba(9,9,15,.96)"},
  midnight:{name:"Medianoche",mode:"dark",bg:"#050810",surface:"#0A0D1A",card:"#0F1220",border:"#181C30",border2:"#252A45",text:"#B8C8E8",muted:"#5A6888",faint:"#2A3050",accent:"#5B8CFF",accentDark:"#1A3A8A",accentGlow:"#5B8CFF33",danger:"#FF6B6B",warn:"#FFA040",success:"#50D890",blockFill:"linear-gradient(145deg,#2040A0,#0A1850)",blockEdge:"linear-gradient(145deg,#5B8CFF,#2040A0)",blockTop:"linear-gradient(145deg,#90B8FF,#5B8CFF)",blockEmpty:"transparent",blockBorder:"#1A2040",navBg:"rgba(5,8,16,.96)"},
  parchment:{name:"Pergamino",mode:"light",bg:"#F5EDD8",surface:"#EDE0C4",card:"#E8D8B0",border:"#C8B080",border2:"#B09060",text:"#3A2808",muted:"#7A6040",faint:"#C8B080",accent:"#8B4513",accentDark:"#5A2A08",accentGlow:"#8B451333",danger:"#C0392B",warn:"#D4800A",success:"#27AE60",blockFill:"linear-gradient(145deg,#8B6030,#5A3808)",blockEdge:"linear-gradient(145deg,#A0702A,#6A4010)",blockTop:"linear-gradient(145deg,#C8901A,#8B6030)",blockEmpty:"#D4C0A022",blockBorder:"#C8B08066",navBg:"rgba(245,237,216,.96)"},
  light:{name:"Claridad",mode:"light",bg:"#F4F6FA",surface:"#ECEEF5",card:"#E4E8F2",border:"#C8CCDE",border2:"#A8AECE",text:"#1A1E2E",muted:"#6870A0",faint:"#C0C4D8",accent:"#4A5FCC",accentDark:"#2A3A9A",accentGlow:"#4A5FCC33",danger:"#E53935",warn:"#F57C00",success:"#388E3C",blockFill:"linear-gradient(145deg,#4A5FCC,#2A3A9A)",blockEdge:"linear-gradient(145deg,#7A90FF,#4A5FCC)",blockTop:"linear-gradient(145deg,#A0B0FF,#7A90FF)",blockEmpty:"#C8CCDE44",blockBorder:"#C8CCDE88",navBg:"rgba(244,246,250,.96)"}
};
const HI=["💧","🥗","⏱️","💪","🏗️","📋","🧠","🎯","📚","🌅","🏃","🍎","💤","✍️","🔋","🧘","🏋️","🚴","🤸","❤️","🩺","💊","🌡️","🧬","🦷","👁️","🫀","🦴","🤲","🫁","🥦","🥚","🥑","🫐","🍋","🥕","🧄","🍵","☕","🧃","🍽️","🥄","🧂","🥩","🍳","🫘","🌮","🍱","🥜","🍇","🫒","🍊","🌽","🥝","📖","🗒️","✅","🔍","💡","🧩","🗓️","⏰","🔔","📊","📈","🎓","🏆","🥇","⭐","🎤","🎧","🖊️","📐","🔭","🔬","💻","📱","🗂️","📎","📌","🗺️","🌿","🔥","⚒️","✨","🌙","🌊","🌸","🌻","🍃","🪴","🌱","🌄","☀️","⚡","❄️","🌈","🌋","🏔️","🏝️","🌾","🍀","🔑","💎","🪙","📦","🛠️","⚙️","🔧","🏠","🏰","🛡️","⚔️","🎲","🎸","🎨","🪄","🧲","🔮","💼","🗝️","🧸","🎀","🎭","🏺","🧭","⚓","🦅","🐺","🦁","🐉","🦋","🐬","🦚","🦊","🐻","🦌","🐝","🦎","🐋","🦜","🐅","🦒","🐘","🦓","🦈","♾️","🔱","⚜️","🌀","💫","☯️","🧿","🪐","💠","🔷","🟡","🔴","🟢","🟣","❤️","🧡","💛","💚","💙","💜","🖤","🤍","💗","💝"];
const MI=["💧","🌿","🔥","⚒️","✨","🌙","⭐","🍎","🧠","🏃","📚","💎","🌊","🔑","🌸","⚡","🔮","🦋","🌻","🏆","💰","🎯","❤️","🪙","🛡️","🐉","🌟","🪐","🍃","🌀","🦅","🧬","🫀","🌈","🔱","⚜️","💫","🦁","🌱","🎲","🧪","🪄","🕊️","🦊","🏔️","🌺","💠","🔷","🌋","⚓","🧭","🏺","🎭","🎨","🎸","🎤","🔭","🔬","🧲","⚗️","🧿","🗝️","🏅","🎪"];
const MC=["#29B6F6","#A1887F","#FF7043","#FFB300","#66BB6A","#CE93D8","#F48FB1","#80DEEA","#FF8A65","#AED581","#4FC3F7","#FFF176","#BCAAA4","#EF9A9A","#A5D6A7","#90CAF9","#FFCC02","#FF6B9D","#C3F584","#67E8F9","#FB923C","#A78BFA","#34D399","#F87171"];
const DM=[{id:"blue",name:"Éter Azul",icon:"💧",color:"#29B6F6",dark:"#0D47A1"},{id:"brown",name:"Tierra Fértil",icon:"🌿",color:"#A1887F",dark:"#3E2723"},{id:"red",name:"Llama Roja",icon:"🔥",color:"#FF7043",dark:"#7F0000"},{id:"gold",name:"Piedra Solar",icon:"⚒️",color:"#FFB300",dark:"#E65100"},{id:"green",name:"Esencia Viva",icon:"✨",color:"#66BB6A",dark:"#1B5E20"}];
const DH=[
  {id:"h1",name:"Hidratación",desc:"Beber en la fuente en cada cambio de sala durante el turno nocturno. Sin botella permitida en las salas de producción, así que la constancia depende de aprovechar cada pausa y desplazamiento.",matId:"blue",isBool:false,rate:1,unit:"litros",icon:"💧"},
  {id:"h2",name:"Cena preparada",desc:"Llevar desde casa la cena del turno: ensalada con legumbres, huevo duro, queso de cabra, tomatitos cherry y aguacate o nueces. Evita el picoteo y los picos de triglicéridos durante la noche.",matId:"brown",isBool:true,rate:1,unit:"",icon:"🥗"},
  {id:"h3",name:"Ayuno respetado",desc:"Respetar la ventana de ayuno entre el desayuno post-turno (batido de colágeno con creatina) y la comida principal del día. Sin picoteo intermedio.",matId:"blue",isBool:true,rate:1,unit:"",icon:"⏱️"},
  {id:"h4",name:"Ejercicio",desc:"Sesión de fuerza funcional y movilidad: sentadillas, flexiones en pared, remo con banda elástica y plancha. Mínimo 15 minutos.",matId:"red",isBool:false,rate:15,unit:"min",icon:"💪"},
  {id:"h5",name:"Oliveras",desc:"Tiempo real trabajado en el proyecto de la fábrica centenaria: gestión de obra, coordinación de albañiles, compras de material, burocracia o trabajo físico.",matId:"gold",isBool:false,rate:2,unit:"h",icon:"🏗️"},
  {id:"h6",name:"Revisión semanal",desc:"20 minutos revisando el estado de gestiones pendientes, la agenda de la semana siguiente y el avance del proyecto Oliveras. Solo el primer día de la semana libre.",matId:"green",isBool:true,rate:1,unit:"",icon:"📋"}
];
const DC={habits:DH,materials:DM,squareRecipe:{blue:1,brown:1,red:0,gold:1,green:0},triangleRecipe:{blue:0,brown:1,red:1,gold:0,green:1},behavior:{soft:{days:2,pct:50},hard:{days:15,pct:100}},themeId:"stone",maxReserve:5,githubToken:"",gistId:""};
const DS={blocksPlaced:0,reserveBlocks:0,consecutiveMisses:0,lastBuildDate:null,collapseCount:0,pyramidsCompleted:0,squarePlaced:0,trianglePlaced:0};
const MR=10,TOT=100,GF="piramide_habitos_backup.json";
const SK={s:"pxv4-state",m:"pxv4-mats",c:"pxv4-cfg",l:"pxv4-logs"};

function sg(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function T(){return THEMES[S.themeId]}
function gm(id){return S.cfg.materials.find(m=>m.id===id)||{id,name:id,icon:"❓",color:"#888",dark:"#444"}}
function bst(mats){const o={};mats.forEach(m=>{o[m.id]=0});return o}
function cb(stock,recipe,mats){return mats.every(m=>(stock[m.id]||0)>=(recipe[m.id]||0))}
function ded(stock,recipe){const n={...stock};Object.keys(recipe).forEach(k=>{n[k]=Math.max(0,(n[k]||0)-(recipe[k]||0))});return n}
function miss(d){if(!d)return 0;const a=new Date(d),b=new Date();a.setHours(0,0,0,0);b.setHours(0,0,0,0);return Math.max(0,Math.floor((b-a)/86400000)-1)}
function fills(n){const f=new Array(MR).fill(0);let r=n;for(let i=MR-1;i>=0&&r>0;i--){const sq=2*i+1;f[i]=Math.min(r,sq);r-=f[i];}return f}

let S={
  tab:"pyramid",gs:{...DS},ms:{},cfg:JSON.parse(JSON.stringify(DC)),themeId:"stone",
  tlog:null,logs:[],done:false,vals:{},
  eh:null,em:null,cs:null,po:null,ps:"",
  bst:null,bgists:[],bsel:""
};

function init(){
  const c=sg(SK.c)||{};
  S.cfg={...JSON.parse(JSON.stringify(DC)),...c};
  if(!S.cfg.materials?.length)S.cfg.materials=DM.map(m=>({...m}));
  const st=sg(SK.s)||{};
  S.gs={...DS,...st};
  const m=miss(S.gs.lastBuildDate);
  if(m>0){
    S.gs.consecutiveMisses=Math.max(S.gs.consecutiveMisses||0,m);
    const beh=S.cfg.behavior;
    if(S.gs.consecutiveMisses>=beh.hard.days&&S.gs.blocksPlaced>0){
      S.gs.blocksPlaced=Math.max(0,S.gs.blocksPlaced-Math.ceil(S.gs.blocksPlaced*beh.hard.pct/100));
      S.gs.reserveBlocks=0;S.gs.consecutiveMisses=0;S.gs.squarePlaced=0;S.gs.trianglePlaced=0;S.gs.collapseCount=(S.gs.collapseCount||0)+1;
      ss(SK.s,S.gs);
    }
  }
  S.themeId=sg('pxv4-theme')||S.cfg.themeId||"stone";S.cfg.themeId=S.themeId;
  S.ms={...bst(S.cfg.materials),...(sg(SK.m)||{})};
  S.logs=sg(SK.l)||[];
  const td=new Date().toDateString();
  S.tlog=S.logs.find(l=>l.date===td)||null;
  S.done=!!S.tlog;
  S.vals={};
  S.cfg.habits.forEach(h=>{S.vals[h.id]=S.tlog?.values?.[h.id]??0;});
  render();
  // Auto-load backup on start if credentials exist
  if(S.cfg.githubToken&&S.cfg.gistId){
    setTimeout(()=>autoLoad(),800);
  }
}

function showToast(msg,color){
  const el=document.getElementById("toast-el");
  el.textContent=msg;
  el.style.cssText=`position:fixed;top:14px;left:50%;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:700;font-family:'Georgia',serif;letter-spacing:.8px;z-index:9999;white-space:nowrap;pointer-events:none;background:#09090F;border:1px solid ${color}99;color:${color};box-shadow:0 4px 24px ${color}44;animation:toast 3.5s ease forwards`;
  el.style.display="block";
  setTimeout(()=>{el.style.display="none"},3600);
}

function render(){
  const Th=T();
  document.getElementById("app").style.background=Th.bg;
  document.getElementById("app").style.color=Th.text;
  document.body.style.background=Th.bg;
  rNav();rMain();
}

function rNav(){
  const Th=T();
  const tabs=[{id:"pyramid",ic:"🏛️",lb:"Pirámide"},{id:"registro",ic:"📝",lb:"Registro"},{id:"almacen",ic:"⚗️",lb:"Almacén"},{id:"config",ic:"⚙️",lb:"Config"}];
  const nav=document.getElementById("nav");
  nav.style.background=Th.navBg;
  nav.style.borderTop=`1px solid ${Th.border}`;
  nav.innerHTML=tabs.map(t=>`<button class="nb" onclick="setTab('${t.id}')"><span class="ni ${S.tab===t.id?'':'dim'}">${t.ic}</span><span class="nl" style="color:${S.tab===t.id?Th.accent:Th.faint}">${t.lb}</span>${S.tab===t.id?`<div class="nd" style="background:${Th.accent}"></div>`:""}</button>`).join("");
}

function rMain(){
  const m=document.getElementById("main");
  m.style.animation="none";void m.offsetHeight;m.style.animation="rise .35s ease";
  if(S.tab==="pyramid")m.innerHTML=vPyramid();
  else if(S.tab==="registro")m.innerHTML=vRegistro();
  else if(S.tab==="almacen")m.innerHTML=vAlmacen();
  else{
    if(S.eh)m.innerHTML=vHE();
    else if(S.em)m.innerHTML=vME();
    else m.innerHTML=vConfig();
  }
  aev();
}

function pyr(n,w,h){
  const Th=T(),f=fills(n),gap=1;
  const cols=MR*2-1; // 19 bloques en la base
  // Tamaño por ancho
  const bwByW=Math.floor((w-gap*(cols-1))/cols);
  // Tamaño por alto disponible
  const bwByH=h?Math.floor((h-gap*(MR-1))/MR/1.5):999;
  const bw=Math.max(12,Math.min(bwByW,bwByH));
  const bh=Math.round(bw*1.5); // bloques más altos que anchos
  let rows="";
  for(let i=0;i<MR;i++){
    const sq=2*i+1,fi=f[i];let cells="";
    for(let j=0;j<sq;j++){
      const iF=j<fi,isE=i>0&&(j===0||j===sq-1),isT=i===0&&iF;
      let bg=Th.blockEmpty,bo=Th.blockBorder+"44",r=2,filt="";
      if(iF){
        if(isT){bg=Th.blockTop;bo=Th.accent;filt=`filter:drop-shadow(0 0 6px ${Th.accent}99)`;r=3}
        else if(isE){bg=Th.blockEdge;bo=Th.accent+"88"}
        else{bg=Th.blockFill;bo=Th.accentDark}
      }
      cells+=`<div style="width:${bw}px;height:${bh}px;background:${bg};border:1px solid ${bo};border-radius:${r}px;flex-shrink:0;${filt};transition:background .4s"></div>`;
    }
    rows+=`<div style="display:flex;gap:${gap}px;justify-content:center;margin-bottom:${gap}px">${cells}</div>`;
  }
  return`<div style="display:flex;flex-direction:column;align-items:center">${rows}</div>`;
}

function vPyramid(){
  const Th=T(),gs=S.gs;
  const missed=Math.max(gs.consecutiveMisses,miss(gs.lastBuildDate));
  const pct=Math.round(gs.blocksPlaced/TOT*100);
  const beh=S.cfg.behavior,danger=missed>=beh.soft.days;
  const dstr=new Date().toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"}).toUpperCase();
  const w=Math.min(window.innerWidth,430)-28;

function calcPreview(){
  const prev={};
  S.cfg.habits.forEach(h=>{
    const v=parseFloat(S.vals[h.id])||0;
    if(v>0){
      const earned=h.isBool?(v>=1?1/h.rate:0):v/h.rate;
      if(earned>0)prev[h.matId]=(prev[h.matId]||0)+earned;
    }
  });
  return prev;
}

function bb(type){

  let nb=S.gs.blocksPlaced+1;
  let nr=S.gs.reserveBlocks;
  let nSq=S.gs.squarePlaced+(isSq?1:0);
  let nTr=S.gs.trianglePlaced+(isSq?0:1);
  let nPyr=S.gs.pyramidsCompleted||0;
  if(cb(nm,recipe,S.cfg.materials)&&nr<S.cfg.maxReserve){nm=ded(nm,recipe);nr++;showToast("⚒️ Bloque + 1 reserva",T().success);}
  else showToast("⚒️ ¡Bloque colocado!",T().accent);

  if(nb>=TOT){
    nPyr++;nb=0;nr=0;nSq=0;nTr=0;
    setTimeout(()=>showToast("🏆 ¡PIRÁMIDE COMPLETADA! #"+nPyr,T().accent),400);
  }
  S.ms=nm;
  S.gs={...S.gs,blocksPlaced:nb,reserveBlocks:nr,consecutiveMisses:0,lastBuildDate:new Date().toDateString(),squarePlaced:nSq,trianglePlaced:nTr,pyramidsCompleted:nPyr};

async function gistSave(token,eid,logs,cfg,gs,stock){
  const payload={version:4,savedAt:new Date().toISOString(),savedAtReadable:new Date().toLocaleString("es-ES"),gameState:gs,matStock:stock,config:{...cfg,githubToken:"***"},logs};
  const body={description:`La Pirámide — Backup ${new Date().toLocaleDateString("es-ES")}`,public:false,files:{[GF]:{content:JSON.stringify(payload,null,2)}}};
  const url=eid?`https://api.github.com/gists/${eid}`:"https://api.github.com/gists";
  const res=await fetch(url,{method:eid?"PATCH":"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json","X-GitHub-Api-Version":"2022-11-28"},body:JSON.stringify(body)});
  if(!res.ok){const e=await res.json();throw new Error(e.message||`HTTP ${res.status}`)}
  return (await res.json()).id;
}
async function gistLoad(token,id){
  const res=await fetch(`https://api.github.com/gists/${id}`,{headers:{Authorization:`Bearer ${token}`,"X-GitHub-Api-Version":"2022-11-28"}});
  if(!res.ok){const e=await res.json();throw new Error(e.message||`HTTP ${res.status}`)}
  const data=await res.json();const content=data.files?.[GF]?.content;
  if(!content)throw new Error("Archivo no encontrado");return JSON.parse(content);
}
async function gistList(token){
  const res=await fetch("https://api.github.com/gists?per_page=30",{headers:{Authorization:`Bearer ${token}`,"X-GitHub-Api-Version":"2022-11-28"}});
  if(!res.ok)throw new Error(`HTTP ${res.status}`);
  return (await res.json()).filter(g=>g.files?.[GF]);
}

async function autoLoad(){
  const token=S.cfg.githubToken,id=S.cfg.gistId;
  if(!token||!id)return;
  try{
    const data=await gistLoad(token,id);
    // Only restore if remote data is newer than local
    const remoteDate=new Date(data.savedAt||0);
    const localDate=new Date(sg('pxv4-lastSync')||0);
    if(remoteDate<=localDate)return; // local is up to date
    const conf={...JSON.parse(JSON.stringify(DC)),...(data.config||{})};
    conf.githubToken=token;conf.gistId=id;
    const st={...DS,...(data.gameState||{})};
    const stock={...bst(conf.materials||DM),...(data.matStock||{})};
    const ll=data.logs||[];
    S.cfg=conf;S.gs=st;S.ms=stock;S.logs=ll;S.themeId=conf.themeId||"stone";
    const td=new Date().toDateString();S.tlog=ll.find(l=>l.date===td)||null;S.done=!!S.tlog;
    S.vals={};S.cfg.habits.forEach(h=>{S.vals[h.id]=S.tlog?.values?.[h.id]??(0)});
    S.vals={};conf.habits.forEach(h=>{S.vals[h.id]=S.tlog?.values?.[h.id]??(0)});
    ss(SK.c,conf);ss(SK.s,st);ss(SK.m,stock);ss(SK.l,ll);
    ss('pxv4-lastSync',data.savedAt);ss('pxv4-theme',conf.themeId||"stone");
    showToast("☁️ Sincronizado desde Gist",T().success);
    render();
  }catch(e){console.warn("AutoLoad failed:",e.message);}
}

// Auto-save when app goes to background (tab hidden, phone locks, etc.)
document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="hidden")autoSave();
});
// pagehide es más fiable en iOS/Android que beforeunload
window.addEventListener("pagehide",()=>autoSave());

// Auto-save on page unload (desktop browsers)
window.addEventListener("beforeunload",()=>{
  if(S.cfg.githubToken&&S.cfg.gistId)autoSave();
});

init();
</script>
</body>
</html>
